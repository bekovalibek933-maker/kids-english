<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#4338CA"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Kids English"/>
<title>Kids English — Family and Friends 2</title>
<link rel="manifest" href="manifest.json"/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet"/>
<style>
:root{
  --p:#4338CA;--pl:#EEF2FF;--p2:#6366F1;
  --g:#16A34A;--gl:#DCFCE7;
  --o:#EA580C;--ol:#FFF7ED;
  --r:#DC2626;--rl:#FEF2F2;
  --b:#0891B2;--bl:#ECFEFF;
  --y:#D97706;--yl:#FFFBEB;
  --pk:#DB2777;--pkl:#FCE7F3;
  --dark:#1E1B4B;--gray:#6B7280;--border:#E5E7EB;--bg:#F0F4FF;
  --white:#fff;--radius:14px;--radius-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);font-family:'Nunito',sans-serif;color:var(--dark);min-height:100vh;overflow-x:hidden;}

/* ── HEADER ── */
.hdr{background:var(--p);padding:12px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px #4338CA44;}
.hdr-back{background:#fff2;border:none;border-radius:8px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;font-size:18px;flex-shrink:0;}
.hdr-title{font-family:'Fredoka One',sans-serif;font-size:18px;color:#fff;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hdr-star{background:#fff2;border-radius:20px;padding:4px 10px;font-size:12px;font-weight:800;color:#FCD34D;white-space:nowrap;}

/* ── SCREENS ── */
.screen{display:none;}.screen.active{display:block;}
.main{padding-bottom:80px;}

/* ── HOME ── */
.hero{background:linear-gradient(135deg,#4338CA,#7C3AED);padding:22px 16px 28px;text-align:center;position:relative;overflow:hidden;}
.hero::after{content:'✨';position:absolute;right:16px;top:16px;font-size:40px;opacity:.3;}
.hero-ico{font-size:52px;display:block;margin-bottom:8px;animation:flt 2s ease-in-out infinite;}
@keyframes flt{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.hero-t{font-family:'Fredoka One',sans-serif;font-size:24px;color:#fff;margin-bottom:3px;}
.hero-s{font-size:12px;color:#C7D2FE;margin-bottom:14px;}
.hero-prog{background:#fff2;border-radius:10px;padding:10px 14px;}
.prog-lbl{display:flex;justify-content:space-between;font-size:11px;color:#C7D2FE;margin-bottom:5px;}
.prog-bar{height:8px;background:#fff2;border-radius:4px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,#34D399,#6EE7B7);border-radius:4px;transition:width .6s ease;}

/* ── STREAK ── */
.streak{background:var(--white);border-radius:var(--radius);padding:12px 14px;display:flex;align-items:center;gap:10px;margin:14px 14px 0;box-shadow:0 2px 8px #0000000a;}
.streak-ico{font-size:32px;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
.streak-n{font-family:'Fredoka One',sans-serif;font-size:22px;color:var(--o);}
.streak-lbl{font-size:11px;color:var(--gray);}
.s-days{display:flex;gap:4px;margin-top:5px;}
.sday{width:28px;height:28px;border-radius:6px;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;}
.sday.done{background:var(--o);color:#fff;}
.sday.today{background:var(--yl);color:var(--y);border:2px solid var(--y);}
.sday.empty{background:#F3F4F6;color:#9CA3AF;}

/* ── SECTION ── */
.section{padding:14px 14px 0;}
.sec-title{font-family:'Fredoka One',sans-serif;font-size:17px;color:var(--dark);margin-bottom:10px;}

/* ── UNIT CARDS ── */
.unit-list{display:flex;flex-direction:column;gap:9px;padding:0 14px 14px;}
.ucard{background:var(--white);border-radius:var(--radius);overflow:hidden;box-shadow:0 2px 8px #0000000a;cursor:pointer;transition:transform .15s;border:2px solid transparent;}
.ucard:active{transform:scale(.98);}
.ucard.locked{opacity:.55;cursor:default;}
.ucard-head{display:flex;align-items:center;gap:10px;padding:12px 14px;}
.ucard-ico{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.ucard-info{flex:1;min-width:0;}
.ucard-num{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;margin-bottom:1px;}
.ucard-name{font-family:'Fredoka One',sans-serif;font-size:15px;color:var(--dark);}
.ucard-meta{font-size:10px;color:var(--gray);margin-top:1px;}
.ucard-pbar{height:3px;background:#F3F4F6;}
.ucard-pfill{height:100%;transition:width .4s;}

/* ── LESSON TABS ── */
.ltabs{display:flex;background:var(--white);gap:0;overflow-x:auto;scrollbar-width:none;position:sticky;top:58px;z-index:50;box-shadow:0 2px 6px #0000000a;border-bottom:2px solid var(--border);}
.ltabs::-webkit-scrollbar{display:none;}
.ltab{padding:10px 14px;font-size:11px;font-weight:800;cursor:pointer;white-space:nowrap;border:none;background:transparent;color:var(--gray);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s;}
.ltab.active{color:var(--p);border-bottom-color:var(--p);}

/* ── LESSON CONTENT ── */
.lcontent{padding:14px;}

/* ── VOCAB ── */
.vcard{background:var(--white);border-radius:var(--radius);overflow:hidden;box-shadow:0 4px 14px #0000000e;margin-bottom:14px;}
.vcard-img{width:100%;height:170px;display:flex;align-items:center;justify-content:center;font-size:72px;position:relative;}
.vcard-body{padding:14px;}
.vcard-word{font-family:'Fredoka One',sans-serif;font-size:26px;color:var(--dark);margin-bottom:3px;}
.vcard-uz{font-size:15px;color:var(--gray);margin-bottom:3px;}
.vcard-pron{font-size:12px;color:#9CA3AF;font-style:italic;margin-bottom:8px;}
.vcard-sent{font-size:13px;color:var(--gray);background:#F8FAFC;border-radius:8px;padding:9px 11px;border-left:3px solid var(--p);line-height:1.6;}
.vcard-sent b{color:var(--p);}
.vcounter{text-align:center;font-size:11px;color:var(--gray);margin-bottom:7px;}
.vdots{display:flex;gap:4px;justify-content:center;margin-bottom:10px;}
.vdot{width:7px;height:7px;border-radius:50%;background:var(--border);transition:all .3s;}
.vdot.active{background:var(--p);transform:scale(1.4);}
.vbtns{display:flex;gap:8px;}
.vbtn{flex:1;padding:10px;border-radius:10px;border:none;font-size:12px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;transition:all .15s;}
.vbtn:active{transform:scale(.97);}
.vbtn.aud{background:var(--p);color:#fff;}
.vbtn.aud.playing{background:var(--g);}
.vbtn.prev{background:var(--pl);color:var(--p);}
.vbtn.nxt{background:var(--p);color:#fff;}

/* ── WORD LIST ── */
.wlist{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.witem{background:var(--white);border-radius:10px;padding:10px;display:flex;flex-direction:column;align-items:center;gap:4px;box-shadow:0 2px 6px #00000008;cursor:pointer;transition:all .15s;border:2px solid transparent;}
.witem:active{transform:scale(.96);}
.witem.done{border-color:var(--g);background:var(--gl);}
.witem-e{font-size:28px;}
.witem-w{font-size:12px;font-weight:800;color:var(--dark);}
.witem-u{font-size:11px;color:var(--gray);}

/* ── DIALOG ── */
.dialog-panel{background:var(--white);border-radius:var(--radius);padding:14px;box-shadow:0 2px 8px #0000000a;margin-bottom:12px;}
.dialog-title{font-size:13px;font-weight:800;color:var(--p);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.dialog-box{background:#F0F4FF;border-radius:10px;padding:12px;margin-bottom:10px;font-size:13px;line-height:2;color:var(--dark);}
.dialog-box .sp{font-weight:800;color:var(--p);}
.dialog-box .line{display:flex;gap:8px;margin-bottom:4px;}
.dialog-box .bubble{background:var(--white);border-radius:8px;padding:6px 10px;font-size:12px;box-shadow:0 1px 4px #0000000a;}
.dialog-box .bubble.left{border-bottom-left-radius:2px;}
.dialog-box .bubble.right{background:var(--pl);border-bottom-right-radius:2px;margin-left:auto;}

/* ── GRAMMAR ── */
.gram-rule{background:var(--pl);border:2px solid #C7D2FE;border-radius:var(--radius);padding:14px;margin-bottom:12px;}
.gram-rule-title{font-family:'Fredoka One',sans-serif;font-size:15px;color:var(--p);margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.gram-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:8px;}
.gram-table th{background:var(--p);color:#fff;padding:7px 10px;text-align:left;font-size:11px;}
.gram-table td{padding:7px 10px;border-bottom:1px solid #E5E7EB;}
.gram-table tr:nth-child(even) td{background:#F8FAFC;}
.gram-table td b{color:var(--p);}
.gram-examples{font-size:13px;line-height:2;color:var(--dark);}
.gram-examples .ex{display:flex;align-items:flex-start;gap:6px;margin-bottom:4px;}
.gram-examples .ex-ico{font-size:14px;margin-top:2px;}
.gram-examples b{color:var(--p);}

/* ── QUIZ ── */
.quiz-card{background:var(--white);border-radius:var(--radius);padding:14px;box-shadow:0 2px 8px #0000000a;margin-bottom:10px;}
.quiz-num{font-size:10px;font-weight:800;color:var(--gray);text-transform:uppercase;margin-bottom:6px;}
.quiz-q{font-size:14px;font-weight:700;color:var(--dark);margin-bottom:10px;line-height:1.6;}
.quiz-q .blank{color:var(--p);font-size:17px;font-weight:900;border-bottom:2px solid var(--p);padding:0 4px;}
.quiz-opts{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.qopt{background:#F8FAFC;border:2px solid var(--border);border-radius:9px;padding:10px;font-size:13px;font-weight:700;color:var(--dark);cursor:pointer;text-align:center;transition:all .15s;font-family:'Nunito',sans-serif;}
.qopt:active{transform:scale(.97);}
.qopt.correct{border-color:var(--g);background:var(--gl);color:var(--g);}
.qopt.wrong{border-color:var(--r);background:var(--rl);color:var(--r);}
.qopt:disabled{cursor:default;}
.quiz-exp{background:var(--gl);border-radius:8px;padding:9px;font-size:12px;color:var(--g);margin-top:7px;display:none;line-height:1.7;}
.quiz-exp.show{display:block;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* ── MATCH ── */
.match-wrap{background:var(--white);border-radius:var(--radius);padding:14px;box-shadow:0 2px 8px #0000000a;margin-bottom:12px;}
.match-title{font-size:12px;font-weight:800;color:var(--gray);text-transform:uppercase;margin-bottom:10px;}
.match-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.match-word{background:var(--pl);border-radius:8px;padding:8px 12px;font-size:13px;font-weight:700;color:var(--p);min-width:80px;text-align:center;}
.match-arrow{color:var(--border);font-size:16px;}
.match-opts{display:flex;flex-wrap:wrap;gap:6px;flex:1;}
.match-opt{background:#F8FAFC;border:2px solid var(--border);border-radius:7px;padding:7px 10px;font-size:12px;cursor:pointer;font-weight:700;transition:all .15s;}
.match-opt.selected{border-color:var(--p);background:var(--pl);color:var(--p);}
.match-opt.correct{border-color:var(--g);background:var(--gl);color:var(--g);}
.match-opt.wrong{border-color:var(--r);background:var(--rl);color:var(--r);}

/* ── SONG ── */
.song-card{background:linear-gradient(135deg,var(--pk),#EC4899);border-radius:var(--radius);padding:18px;text-align:center;color:#fff;margin-bottom:12px;}
.song-note{font-size:44px;display:block;margin-bottom:7px;}
.song-note.spinning{animation:spin 2s linear infinite;}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.song-t{font-family:'Fredoka One',sans-serif;font-size:18px;margin-bottom:3px;}
.song-sub{font-size:11px;opacity:.8;margin-bottom:12px;}
.song-play{background:#fff;border:none;border-radius:10px;padding:10px 20px;font-size:13px;font-weight:800;color:var(--pk);cursor:pointer;transition:all .15s;font-family:'Nunito',sans-serif;}
.song-play:active{transform:scale(.97);}
.song-lyrics{background:#ffffff22;border-radius:10px;padding:12px;text-align:left;margin-top:12px;font-size:12px;line-height:2.2;font-style:italic;}
.song-lyrics .chorus{color:#FFD93D;font-weight:700;font-style:normal;}

/* ── PHONICS ── */
.phon-header{background:linear-gradient(135deg,var(--y),#F59E0B);border-radius:var(--radius);padding:14px;text-align:center;color:#fff;margin-bottom:12px;}
.phon-title{font-family:'Fredoka One',sans-serif;font-size:17px;margin-bottom:4px;}
.phon-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
.phon-item{background:var(--white);border-radius:10px;padding:10px 6px;text-align:center;cursor:pointer;transition:all .15s;box-shadow:0 2px 6px #00000008;border:2px solid transparent;}
.phon-item:active{transform:scale(.95);}
.phon-item.played{border-color:var(--g);background:var(--gl);}
.phon-e{font-size:26px;display:block;margin-bottom:4px;}
.phon-letter{font-family:'Fredoka One',sans-serif;font-size:14px;color:var(--p);}
.phon-word{font-size:10px;color:var(--gray);margin-top:1px;}
.phon-quiz{background:var(--white);border-radius:var(--radius);padding:14px;box-shadow:0 2px 8px #0000000a;}
.phon-quiz-title{font-size:12px;font-weight:800;color:var(--gray);text-transform:uppercase;margin-bottom:10px;}

/* ── SKILLS (Reading) ── */
.reading-text{background:var(--white);border-radius:var(--radius);padding:14px;box-shadow:0 2px 8px #0000000a;margin-bottom:12px;}
.reading-title{font-family:'Fredoka One',sans-serif;font-size:16px;color:var(--p);margin-bottom:8px;}
.reading-author{font-size:11px;color:var(--gray);margin-bottom:10px;}
.reading-body{font-size:13px;line-height:2;color:var(--dark);background:#F8FAFC;border-radius:8px;padding:12px;}
.reading-body b{color:var(--p);}
.tf-card{background:var(--white);border-radius:var(--radius);padding:14px;box-shadow:0 2px 8px #0000000a;margin-bottom:10px;}
.tf-q{font-size:13px;font-weight:700;color:var(--dark);margin-bottom:8px;line-height:1.6;}
.tf-btns{display:flex;gap:7px;}
.tf-btn{flex:1;padding:9px;border-radius:8px;border:2px solid var(--border);background:transparent;font-size:13px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;transition:all .15s;}
.tf-btn.t{color:var(--g);}
.tf-btn.f{color:var(--r);}
.tf-btn.sel-t{background:var(--gl);border-color:var(--g);}
.tf-btn.sel-f{background:var(--rl);border-color:var(--r);}

/* ── WRITING ── */
.write-task{background:var(--white);border-radius:var(--radius);padding:14px;box-shadow:0 2px 8px #0000000a;margin-bottom:12px;}
.write-instr{font-size:13px;font-weight:700;color:var(--dark);margin-bottom:10px;}
.write-input{width:100%;border:2px solid var(--border);border-radius:8px;padding:10px 12px;font-size:14px;font-family:'Nunito',sans-serif;color:var(--dark);outline:none;min-height:70px;resize:none;transition:border-color .2s;}
.write-input:focus{border-color:var(--p);}
.write-input.correct{border-color:var(--g);background:var(--gl);}
.write-input.wrong{border-color:var(--r);background:var(--rl);}
.fill-inp{width:100%;border:none;border-bottom:2px solid var(--p);background:transparent;font-family:'Nunito',sans-serif;font-size:14px;color:var(--dark);padding:4px 6px;outline:none;display:inline-block;}
.fill-sent{font-size:14px;line-height:2.4;color:var(--dark);margin-bottom:8px;}

/* ── WORKBOOK ── */
.wb-section{background:var(--white);border-radius:var(--radius);padding:14px;box-shadow:0 2px 8px #0000000a;margin-bottom:12px;}
.wb-section-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--gray);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.wb-q{font-size:13px;color:var(--dark);margin-bottom:8px;line-height:1.7;font-weight:600;}

/* ── DRAG & DROP ORDER ── */
.order-slots{display:flex;flex-wrap:wrap;gap:5px;min-height:38px;border:2px dashed var(--border);border-radius:8px;padding:7px;margin-bottom:8px;background:#FAFAFA;}
.slot-chip{background:var(--p);color:#fff;border-radius:6px;padding:5px 10px;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;}
.slot-chip:active{transform:scale(.96);}
.word-bank{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;}
.bank-chip{background:var(--pl);color:var(--p);border-radius:6px;padding:5px 10px;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;}
.bank-chip:active{transform:scale(.96);}
.bank-chip.used{opacity:.3;cursor:default;pointer-events:none;}

/* ── FEEDBACK ── */
.fb{text-align:center;font-size:12px;font-weight:700;min-height:18px;margin:6px 0;}
.fb.ok{color:var(--g);}
.fb.err{color:var(--r);}

/* ── CHECK BTN ── */
.check-btn{width:100%;padding:12px;background:var(--p);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;margin-top:8px;transition:all .15s;}
.check-btn:active{transform:scale(.98);background:#3730A3;}

/* ── COMPLETE ── */
.complete{background:linear-gradient(135deg,var(--p),#7C3AED);border-radius:var(--radius);padding:24px 16px;text-align:center;color:#fff;margin-bottom:14px;}
.complete-e{font-size:52px;display:block;margin-bottom:10px;animation:bounce .8s infinite;}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.complete-t{font-family:'Fredoka One',sans-serif;font-size:22px;margin-bottom:5px;}
.complete-s{font-size:12px;opacity:.8;margin-bottom:12px;}
.complete-stars{font-size:26px;letter-spacing:3px;margin-bottom:14px;}
.home-btn{background:#fff;border:none;border-radius:10px;padding:10px 22px;font-size:13px;font-weight:800;font-family:'Nunito',sans-serif;color:var(--p);cursor:pointer;}

/* ── BOTTOM NAV ── */
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--border);display:flex;padding:8px 0 max(8px,env(safe-area-inset-bottom));z-index:100;}
.bn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:3px 0;}
.bn-ico{font-size:20px;}
.bn-lbl{font-size:9px;font-weight:700;color:var(--gray);}
.bn.active .bn-lbl{color:var(--p);}

/* ── PROFILE ── */
.prof-hero{background:linear-gradient(135deg,#7C3AED,var(--p));padding:24px 14px;text-align:center;}
.prof-av{font-size:48px;display:block;margin-bottom:7px;}
.prof-name{font-family:'Fredoka One',sans-serif;font-size:20px;color:#fff;}
.prof-lvl{font-size:11px;color:#C7D2FE;margin-top:2px;}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;padding:14px;}
.stat-box{background:var(--white);border-radius:var(--radius-sm);padding:10px;text-align:center;box-shadow:0 2px 6px #00000006;}
.stat-v{font-family:'Fredoka One',sans-serif;font-size:20px;}
.stat-l{font-size:10px;color:var(--gray);margin-top:1px;}
.ach-grid{display:flex;flex-wrap:wrap;gap:7px;padding:0 14px 14px;}
.ach{background:var(--yl);border-radius:8px;padding:7px 11px;font-size:11px;font-weight:700;color:var(--y);display:flex;align-items:center;gap:5px;}

/* ── TOAST ── */
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--dark);color:#fff;padding:9px 18px;border-radius:18px;font-size:12px;font-weight:700;opacity:0;transition:all .3s;z-index:200;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── INFO BOX ── */
.info-box{background:var(--pl);border-left:4px solid var(--p);border-radius:8px;padding:10px 12px;font-size:12px;color:var(--dark);line-height:1.7;margin-bottom:10px;}
.info-box b{color:var(--p);}
</style>
</head>
<body>
<div id="toast" class="toast"></div>

<!-- HOME -->
<div class="screen active" id="screen-home">
  <div class="hdr">
    <span style="font-size:22px">📚</span>
    <div class="hdr-title">Kids English</div>
    <div class="hdr-star">⭐ <span id="hs">0</span></div>
  </div>
  <div class="main">
    <div class="hero">

// ══════════════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════════════
let ST = {
  stars: +localStorage.getItem('ke_stars')||0,
  streak: +localStorage.getItem('ke_streak')||2,
  progress: JSON.parse(localStorage.getItem('ke_progress')||'{}'),
  unit: null, tabIdx:0, vocabIdx:0, vocabSet:1
};
function save(){
  localStorage.setItem('ke_stars',ST.stars);
  localStorage.setItem('ke_streak',ST.streak);
  localStorage.setItem('ke_progress',JSON.stringify(ST.progress));
}

// ══════════════════════════════════════════════════════════════
//  NAVIGATION
// ══════════════════════════════════════════════════════════════
function showTab(n){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.bn').forEach(b=>b.classList.remove('active'));
  document.getElementById('screen-'+n).classList.add('active');
  document.getElementById('bn-'+n)?.classList.add('active');
  if(n==='profile') renderProfile();
}
function goHome(){showTab('home'); renderHome();}

// ══════════════════════════════════════════════════════════════
//  HOME
// ══════════════════════════════════════════════════════════════
function renderHome(){
  document.getElementById('hs').textContent = ST.stars;
  document.getElementById('stn').textContent = ST.streak+' kun';
  const done = UNITS.filter(u=>ST.progress[u.id]?.done).length;
  const pct = Math.round(done/UNITS.length*100);
  document.getElementById('hpct').textContent = pct+'%';
  document.getElementById('hbar').style.width = pct+'%';

  const list = document.getElementById('unit-list');
  list.innerHTML = '';
  UNITS.forEach(u=>{
    const pr = ST.progress[u.id];
    const pct2 = pr ? Math.round((pr.tabs||0)/u.lessons.length*100) : 0;
    const locked = u.locked && !pr;
    const d = document.createElement('div');
    d.className = 'ucard'+(locked?' locked':'');
    d.innerHTML = `
      <div class="ucard-head">
        <div class="ucard-ico" style="background:${u.colorL}">${u.emoji}</div>
        <div class="ucard-info">
          <div class="ucard-num" style="color:${u.color}">${u.num} ${locked?'🔒':''}</div>
          <div class="ucard-name">${u.name}</div>
          <div class="ucard-meta">🎵 Track ${u.tracks[0]}–${u.tracks[2]} ${pct2>0?'• '+pct2+'% bajarildi':''} • ${u.lessons.length} dars</div>
        </div>
        <div style="font-size:20px;color:var(--border)">${locked?'':'›'}</div>
      </div>
      <div class="ucard-pbar"><div class="ucard-pfill" style="width:${pct2}%;background:${u.color}"></div></div>`;
    if(!locked) d.onclick=()=>openUnit(u);
    list.appendChild(d);
  });
}

// ══════════════════════════════════════════════════════════════
//  OPEN UNIT
// ══════════════════════════════════════════════════════════════
function openUnit(unit){
  ST.unit=unit; ST.vocabIdx=0; ST.vocabSet=1;
  document.getElementById('ltitle').textContent=unit.name;
  document.getElementById('ls').textContent=ST.stars;
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-lesson').classList.add('active');
  buildTabs(unit); showLesson(0);
}

function buildTabs(unit){
  const tabs = document.getElementById('ltabs');
  tabs.innerHTML='';
  unit.lessons.forEach((l,i)=>{
    const btn=document.createElement('button');
    btn.className='ltab'+(i===0?' active':'');
    btn.textContent=l.label;
    btn.onclick=()=>{
      document.querySelectorAll('.ltab').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      showLesson(i);
    };
    tabs.appendChild(btn);
  });
}

function showLesson(idx){
  ST.tabIdx=idx;
  const unit=ST.unit;
  const lesson=unit.lessons[idx];
  const body=document.getElementById('lbody');
  body.innerHTML='';
  ST.vocabIdx=0; ST.vocabSet=1;

  if(lesson.id==='words') renderWords(lesson,body,unit);
  else if(lesson.id==='grammar') renderGrammar(lesson,body);
  else if(lesson.id==='song') renderSong(lesson,body);
  else if(lesson.id==='phonics') renderPhonics(lesson,body);
  else if(lesson.id==='skills') renderSkills(lesson,body);
  else if(lesson.id==='workbook') renderWorkbook(lesson,body,unit);

  // Track progress
  if(!ST.progress[unit.id]) ST.progress[unit.id]={tabs:0};
  if((ST.progress[unit.id].tabs||0)<idx+1) ST.progress[unit.id].tabs=idx+1;
  save();
}

// ══════════════════════════════════════════════════════════════
//  WORDS
// ══════════════════════════════════════════════════════════════
function renderWords(lesson,body,unit){
  // Set selector
  const setBar=document.createElement('div');
  setBar.style.cssText='display:flex;gap:8px;margin-bottom:12px;';
  ['1-ro\'yxat','2-ro\'yxat'].forEach((lbl,si)=>{
    const btn=document.createElement('button');
    btn.className='check-btn';
    btn.style.cssText=`flex:1;margin:0;padding:8px;font-size:12px;background:${ST.vocabSet===si+1?unit.color:'var(--border)'};color:${ST.vocabSet===si+1?'#fff':'var(--gray)'};`;
    btn.textContent=lbl;
    btn.onclick=()=>{ST.vocabSet=si+1;ST.vocabIdx=0;renderWords(lesson,body,unit);};
    setBar.appendChild(btn);
  });
  body.appendChild(setBar);

  const words=ST.vocabSet===1?lesson.words1:lesson.words2;

  // Word grid
  const gridTitle=document.createElement('div');
  gridTitle.className='sec-title';
  gridTitle.textContent='📋 Barcha so\'zlar';
  body.appendChild(gridTitle);

  const grid=document.createElement('div');
  grid.className='wlist';
  words.forEach((w,i)=>{
    const item=document.createElement('div');
    item.className='witem';
    item.id='wi-'+i;
    item.innerHTML=`<div class="witem-e">${w.e}</div><div class="witem-w">${w.w}</div><div class="witem-u">${w.uz}</div>`;
    item.onclick=()=>{speak(w.w);item.classList.add('done');toast('🔊 '+w.w);};
    grid.appendChild(item);
  });
  body.appendChild(grid);

  // Flashcard
  const fcTitle=document.createElement('div');
  fcTitle.className='sec-title';
  fcTitle.textContent='🃏 Karta';
  body.appendChild(fcTitle);

  function renderCard(){
    const old=document.getElementById('vcard-wrap');
    if(old) old.remove();
    const wrap=document.createElement('div');
    wrap.id='vcard-wrap';
    const w=words[ST.vocabIdx];
    const bg=`linear-gradient(135deg,${unit.color}22,${unit.color}44)`;
    wrap.innerHTML=`
      <div class="vcounter">${ST.vocabIdx+1} / ${words.length} so'z</div>
      <div class="vdots">${words.map((_,i)=>`<div class="vdot${i===ST.vocabIdx?' active':''}"></div>`).join('')}</div>
      <div class="vcard">
        <div class="vcard-img" style="background:${bg}">${w.e}</div>
        <div class="vcard-body">
          <div class="vcard-word">${w.w}</div>
          <div class="vcard-uz">🇺🇿 ${w.uz}</div>
          <div class="vcard-sent">${w.s}</div>
          <div style="display:flex;gap:8px;margin-top:10px;">
            <button class="vbtn aud" id="vaud" onclick="speak('${w.w}',document.getElementById('vaud'))">🔊 Tinglash</button>
          </div>
          <div class="vbtns" style="margin-top:8px;">
            <button class="vbtn prev" onclick="moveVocab(-1,${words.length})">← Oldingi</button>
            <button class="vbtn nxt" onclick="moveVocab(1,${words.length})">Keyingi →</button>
          </div>
        </div>
      </div>`;
    const before=document.getElementById('vdialog');
    if(before) body.insertBefore(wrap,before);
    else body.appendChild(wrap);
  }
  renderCard();

  window.moveVocab=(dir,total)=>{
    ST.vocabIdx=Math.max(0,Math.min(total-1,ST.vocabIdx+dir));
    if(dir>0&&ST.vocabIdx===total-1){addStars(1);toast('🌟 So\'zlar tugadi! +1 yulduz');}
    renderCard();
  };

  // Dialog
  if(lesson.dialog){
    const dTitle=document.createElement('div');
    dTitle.className='sec-title';
    dTitle.id='vdialog';
    dTitle.style.marginTop='14px';
    dTitle.textContent='💬 Hikoya';
    body.appendChild(dTitle);

    const dpanel=document.createElement('div');
    dpanel.className='dialog-panel';
    dpanel.innerHTML=`<div class="dialog-title">📖 Listen and read — Track ${unit.tracks[0]}</div>
      <div class="dialog-box">${lesson.dialog.map(d=>
        `<div class="line">
          <div class="bubble ${d.side}" style="max-width:85%">
            <span style="font-size:10px;font-weight:800;color:var(--p)">${d.sp}: </span>${d.t}
          </div>
        </div>`).join('')}
      </div>`;
    body.appendChild(dpanel);
  }
}

// ══════════════════════════════════════════════════════════════
//  GRAMMAR
// ══════════════════════════════════════════════════════════════
function renderGrammar(lesson,body){
  lesson.rules.forEach((rule,ri)=>{
    // Rule box
    const rbox=document.createElement('div');
    rbox.className='gram-rule';
    let tableHtml='';
    if(rule.table){
      tableHtml=`<table class="gram-table">
        <tr>${Object.keys(rule.table[0]).length>2?'<th>O\'zbek</th><th>Ingliz</th><th>Misol</th>':'<th>O\'zbek</th><th>Ingliz</th><th>Misol</th>'}</tr>
        ${rule.table.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}
      </table>`;
    }
    rbox.innerHTML=`
      <div class="gram-rule-title">📐 ${rule.title}</div>
      ${tableHtml}
      <div class="gram-examples">${rule.examples.map(e=>`<div class="ex"><span class="ex-ico">▸</span><span>${e}</span></div>`).join('')}</div>`;
    body.appendChild(rbox);

    // Quizzes
    const qTitle=document.createElement('div');
    qTitle.className='sec-title';
    qTitle.style.marginTop='12px';
    qTitle.textContent='📝 Mashqlar';
    body.appendChild(qTitle);

    rule.quizzes.forEach((q,qi)=>{
      const qcard=document.createElement('div');
      qcard.className='quiz-card';
      const expId=`qe-${ri}-${qi}`;
      qcard.innerHTML=`
        <div class="quiz-num">Savol ${qi+1}</div>
        <div class="quiz-q">${q.q.replace('___','<span class="blank">___</span>')}</div>
        <div class="quiz-opts">${q.opts.map((o,oi)=>
          `<button class="qopt" onclick="checkQ(this,${oi},${q.a},'${esc(q.exp)}','${expId}')">${o}</button>`).join('')}
        </div>
        <div class="quiz-exp" id="${expId}"></div>`;
      body.appendChild(qcard);
    });
  });
}

// ══════════════════════════════════════════════════════════════
//  SONG
// ══════════════════════════════════════════════════════════════
function renderSong(lesson,body){
  const s=lesson.song;
  let playing=false;

  const scard=document.createElement('div');
  scard.className='song-card';
  scard.innerHTML=`
    <span class="song-note" id="snote">🎵</span>
    <div class="song-t">${s.title}</div>
    <div class="song-sub">Track ${s.track} — Eshitib, kuylab ko'ring!</div>
    <button class="song-play" id="spbtn" onclick="toggleSong()">▶ Boshlash</button>
    <div class="song-lyrics">${s.lyrics.replace(/\n/g,'<br>').replace(/🎵/g,'<span class="chorus">🎵</span>')}</div>`;
  body.appendChild(scard);

  window.toggleSong=()=>{
    playing=!playing;
    document.getElementById('snote').classList.toggle('spinning',playing);
    document.getElementById('spbtn').textContent=playing?'⏸ To\'xtatish':'▶ Boshlash';
    if(playing){addStars(1);toast('🎵 Qo\'shiq! +1 yulduz');}
  };

  // Extra words
  if(s.extra_words){
    const ewt=document.createElement('div');
    ewt.className='sec-title';
    ewt.style.marginTop='14px';
    ewt.textContent='📚 Qo\'shiqdagi yangi so\'zlar';
    body.appendChild(ewt);
    const ew=document.createElement('div');
    ew.className='wlist';
    s.extra_words.forEach(w=>{
      const item=document.createElement('div');
      item.className='witem';
      item.innerHTML=`<div class="witem-e">${w.e}</div><div class="witem-w">${w.w}</div><div class="witem-u">${w.uz}</div>`;
      item.onclick=()=>{speak(w.w);item.classList.add('done');toast('🔊 '+w.w);};
      ew.appendChild(item);
    });
    body.appendChild(ew);
  }
}

function renderPhonics(lesson,body){
  const p=lesson.phonics;

  const hdr=document.createElement('div');
  hdr.className='phon-header';
  hdr.innerHTML=`<div class="phon-title">🔤 ${p.title}</div><div style="font-size:11px;opacity:.8">Track ${lesson.phonics.track}</div>`;
  body.appendChild(hdr);

  // Chant
  const chant=document.createElement('div');
  chant.className='wb-section';
  chant.innerHTML=`<div class="wb-section-title">🎵 Chant</div>
    <div style="background:#FFFBEB;border-radius:8px;padding:12px;font-size:13px;line-height:2.2;font-style:italic;color:var(--dark)">${p.chant.replace(/\n/g,'<br>')}</div>`;
  body.appendChild(chant);

  // Letters grid
  const lt=document.createElement('div');
  lt.className='sec-title';
  lt.textContent='🔤 Harflar va so\'zlar';
  body.appendChild(lt);

  const grid=document.createElement('div');
  grid.className='phon-grid';
  p.items.forEach(item=>{
    const d=document.createElement('div');
    d.className='phon-item';
    d.innerHTML=`<span class="phon-e">${item.e}</span><div class="phon-letter">${item.l}</div><div class="phon-word">${item.w}</div>`;
    d.onclick=()=>{speak(item.w);d.classList.add('played');toast('🔊 '+item.l+' — '+item.w);};
    grid.appendChild(d);
  });
  body.appendChild(grid);

  // Quiz
  const qt=document.createElement('div');
  qt.className='sec-title';
  qt.textContent='🎮 O\'yin — To\'g\'ri harfni toping';
  body.appendChild(qt);

  let pqIdx=0;
  const pqContainer=document.createElement('div');
  pqContainer.className='phon-quiz';
  body.appendChild(pqContainer);

  function renderPQ(){
    if(pqIdx>=p.quiz.length){
      pqContainer.innerHTML=`<div style="text-align:center;padding:16px;font-size:14px;font-weight:700;color:var(--g)">🎉 Barcha savollar bajarildi! Zo'r!</div>`;
      return;
    }
    const q=p.quiz[pqIdx];
    pqContainer.innerHTML=`
      <div class="quiz-num">Savol ${pqIdx+1}/${p.quiz.length}</div>
      <div class="quiz-q">${q.q}</div>
      <div class="quiz-opts">${q.opts.map((o,i)=>
        `<button class="qopt" onclick="checkPQ(this,${i},${q.a},pqContainer)">${o}</button>`).join('')}
      </div>`;
  }
  window.checkPQ=(btn,chosen,ans,el)=>{
    el.querySelectorAll('.qopt').forEach(b=>b.disabled=true);
    if(chosen===ans){btn.classList.add('correct');addStars(1);toast('✅ To\'g\'ri! +1 yulduz');setTimeout(()=>{pqIdx++;renderPQ();},1000);}
    else{btn.classList.add('wrong');el.querySelectorAll('.qopt')[ans].classList.add('correct');toast('❌ Noto\'g\'ri!');setTimeout(()=>{pqIdx++;renderPQ();},1500);}
  };
  renderPQ();
}

//  WORKBOOK
// ══════════════════════════════════════════════════════════════
function renderWorkbook(lesson,body,unit){
  const info=document.createElement('div');
  info.className='info-box';
  info.innerHTML=`<b>✏️ Workbook mashqlari</b> — Bu mashqlar darslik workbook (${unit.num}) dan olingan.`;
  body.appendChild(info);

  lesson.exercises.forEach((ex,ei)=>{
    const sec=document.createElement('div');
    sec.className='wb-section';

    if(ex.type==='fill_blanks'){
      sec.innerHTML=`<div class="wb-section-title">${ex.title}</div>
        <div class="info-box">${ex.instruction}</div>`;
      ex.items.forEach((item,i)=>{
        sec.innerHTML+=`
          <div style="margin-bottom:10px;">
            <div class="wb-q">${i+1}. ${item.sent}</div>
            <input id="fb-${ei}-${i}" type="text" style="width:100%;border:2px solid var(--border);border-radius:8px;padding:8px 10px;font-family:'Nunito',sans-serif;font-size:13px;outline:none;" placeholder="Javobingiz..."/>
            <div class="fb" id="fbf-${ei}-${i}"></div>
          </div>`;
      });
      sec.innerHTML+=`<button class="check-btn" onclick="checkFills(${ei},${ex.items.length})">✅ Tekshirish</button>`;
      body.appendChild(sec);
      ex.items.forEach((item,i)=>{
        const el=document.getElementById(`fb-${ei}-${i}`);
        if(el) el.addEventListener('focus',()=>el.style.borderColor='var(--p)');
      });
      window[`checkFills`]=window[`checkFills`]||{};
      window.checkFills=(ei2,n)=>{
        const exData=lesson.exercises[ei2];
        exData.items.forEach((item2,i)=>{
          const el=document.getElementById(`fb-${ei2}-${i}`);
          const fb=document.getElementById(`fbf-${ei2}-${i}`);
          if(!el||!fb)return;
          if(el.value.trim().toLowerCase()===item2.answer.toLowerCase()){
            el.style.borderColor='var(--g)';el.style.background='var(--gl)';
            fb.className='fb ok';fb.textContent='✅ To\'g\'ri!';addStars(1);
          }else if(el.value.trim()){
            el.style.borderColor='var(--r)';el.style.background='var(--rl)';
            fb.className='fb err';fb.textContent='❌ To\'g\'ri: '+item2.answer;
          }
        });
        toast('✅ Tekshirildi!');
      };
    }

    else if(ex.type==='match'){
      sec.innerHTML=`<div class="wb-section-title">${ex.title}</div>
        <div class="info-box">${ex.instruction}</div>`;
      const pairs=ex.pairs;
      const leftWords=pairs.map(p=>p[0]);
      const rightWords=[...pairs.map(p=>p[1])].sort(()=>Math.random()-.5);
      const selState={left:null,matched:{}};

      const matchWrap=document.createElement('div');
      matchWrap.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;';

      const leftCol=document.createElement('div');
      leftCol.style.cssText='display:flex;flex-direction:column;gap:6px;';
      const rightCol=document.createElement('div');
      rightCol.style.cssText='display:flex;flex-direction:column;gap:6px;';

      leftWords.forEach((w,i)=>{
        const btn=document.createElement('button');
        btn.id=`ml-${ei}-${i}`;
        btn.style.cssText='background:var(--pl);border:2px solid var(--p);border-radius:8px;padding:8px 10px;font-size:12px;font-weight:700;color:var(--p);cursor:pointer;font-family:Nunito,sans-serif;text-align:left;';
        btn.textContent=w;
        btn.onclick=()=>{
          if(selState.matched[i]) return;
          document.querySelectorAll('[id^="ml-'+ei+'"]').forEach(b=>b.style.background='var(--pl)');
          selState.left=i;
          btn.style.background='#C7D2FE';
        };
        leftCol.appendChild(btn);
      });

      rightWords.forEach((w,i)=>{
        const btn=document.createElement('button');
        btn.id=`mr-${ei}-${i}`;
        btn.style.cssText='background:#F8FAFC;border:2px solid var(--border);border-radius:8px;padding:8px 10px;font-size:12px;font-weight:700;color:var(--dark);cursor:pointer;font-family:Nunito,sans-serif;text-align:left;';
        btn.textContent=w;
        btn.onclick=()=>{
          if(selState.left===null) return;
          const li=selState.left;
          const correctRight=pairs[li][1];
          if(w===correctRight){
            document.getElementById(`ml-${ei}-${li}`).style.cssText+=';background:var(--gl);border-color:var(--g);color:var(--g);';
            btn.style.cssText+=';background:var(--gl);border-color:var(--g);color:var(--g);';
            selState.matched[li]=true;
            addStars(1); toast('✅ To\'g\'ri!');
          } else {
            toast('❌ Mos emas, qayta urinib ko\'ring!');
          }
          selState.left=null;
          document.querySelectorAll('[id^="ml-'+ei+'"]').forEach(b=>{if(!selState.matched[Object.keys(selState.matched).find(k=>leftWords[k]===b.textContent)])b.style.background='var(--pl)';});
        };
        rightCol.appendChild(btn);
      });

      matchWrap.appendChild(leftCol);
      matchWrap.appendChild(rightCol);
      sec.appendChild(matchWrap);
      body.appendChild(sec);
    }

    else if(ex.type==='true_false'){
      sec.innerHTML=`<div class="wb-section-title">${ex.title}</div>`;
      ex.items.forEach((item,i)=>{
        const eid=`tf-${ei}-${i}`;
        const tfc=document.createElement('div');
        tfc.className='tf-card';
        tfc.innerHTML=`
          <div class="tf-q">${i+1}. ${item.q}</div>
          <div class="tf-btns">
            <button class="tf-btn t" onclick="checkTF2(this,'t',${item.a},'${esc(item.exp)}','${eid}')">✅ To'g'ri</button>
            <button class="tf-btn f" onclick="checkTF2(this,'f',${item.a},'${esc(item.exp)}','${eid}')">❌ Noto'g'ri</button>
          </div>
          <div class="fb" id="${eid}"></div>`;
        sec.appendChild(tfc);
      });
      body.appendChild(sec);
    }

    else if(ex.type==='order'){
      sec.innerHTML=`<div class="wb-section-title">${ex.title}</div>`;
      if(ex.instruction) sec.innerHTML+=`<div class="info-box">${ex.instruction}</div>`;
      ex.items.forEach((item,i)=>{
        const shuffled=[...item.words].sort(()=>Math.random()-.5);
        const oid=`ord-${ei}-${i}`;
        sec.innerHTML+=`
          <div style="margin-bottom:14px;">
            <div style="font-size:12px;color:var(--gray);margin-bottom:6px;">Jumla ${i+1}:</div>
            <div class="order-slots" id="${oid}-slots"></div>
            <div class="word-bank" id="${oid}-bank">
              ${shuffled.map((w,wi)=>`<div class="bank-chip" id="${oid}-w${wi}" onclick="addToOrder('${oid}',this,'${w}')">${w}</div>`).join('')}
            </div>
            <div class="fb" id="${oid}-fb"></div>
            <button class="check-btn" style="margin-top:4px;" onclick="checkOrder2('${oid}','${item.answer}')">✅ Tekshirish</button>
          </div>`;
      });
      body.appendChild(sec);

      window.addToOrder=(oid,chip,word)=>{
        if(chip.classList.contains('used')) return;
        chip.classList.add('used');
        const slots=document.getElementById(oid+'-slots');
        const sc=document.createElement('div');
        sc.className='slot-chip'; sc.textContent=word;
        sc.onclick=()=>{sc.remove(); chip.classList.remove('used');};
        slots.appendChild(sc);
      };
      window.checkOrder2=(oid,ans)=>{
        const slots=document.getElementById(oid+'-slots');
        const result=Array.from(slots.querySelectorAll('.slot-chip')).map(c=>c.textContent).join(' ');
        const fb=document.getElementById(oid+'-fb');
        if(result===ans){
          fb.className='fb ok'; fb.textContent='✅ To\'g\'ri tartib! Ajoyib!';
          addStars(2); toast('✅ Zo\'r! +2 yulduz');
        } else {
          fb.className='fb err'; fb.textContent="❌ Qayta urinib ko'ring!";
        }
      };
    }
  });

  // Complete button
  const comp=document.createElement('button');
  comp.className='check-btn';
  comp.style.cssText=`background:${unit.color};margin-top:8px;`;
  comp.textContent='🏆 Unitni tugatish!';
  comp.onclick=()=>completeUnit(unit);
  body.appendChild(comp);
}

// ══════════════════════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════════════════════
window.checkQ=(btn,chosen,ans,exp,expId)=>{
  btn.closest('.quiz-opts').querySelectorAll('.qopt').forEach(b=>b.disabled=true);
  if(chosen===ans){
    btn.classList.add('correct'); addStars(1); toast('✅ To\'g\'ri! +1 yulduz');
  } else {
    btn.classList.add('wrong');
    btn.closest('.quiz-opts').querySelectorAll('.qopt')[ans].classList.add('correct');
    toast('❌ Noto\'g\'ri!');
  }
  if(expId){
    const el=document.getElementById(expId);
    if(el){el.innerHTML=exp||''; el.classList.add('show');}
  }
};

window.checkTF2=(btn,chosen,ans,exp,eid)=>{
  const par=btn.closest('.tf-btns');
  par.querySelectorAll('.tf-btn').forEach(b=>b.disabled=true);
  const correct=(chosen==='t')===ans;
  btn.classList.add(correct?(chosen==='t'?'sel-t':'sel-f'):(chosen==='t'?'sel-t':'sel-f'));
  if(!correct) btn.style.cssText+=';background:var(--rl);border-color:var(--r);';
  const fb=document.getElementById(eid);
  if(fb){fb.className='fb '+(correct?'ok':'err'); fb.textContent=exp;}
  if(correct){addStars(1);toast('✅ To\'g\'ri! +1 yulduz');}
  else toast('❌ Noto\'g\'ri!');
};

function speak(word,btn){
  if(!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(word);
  u.lang='en-US'; u.rate=0.8;
  if(btn){
    const orig=btn.textContent;
    btn.textContent='🔊...';
    u.onend=()=>btn.textContent=orig;
  }
  speechSynthesis.speak(u);
}

function addStars(n){
  ST.stars+=n;
  document.getElementById('hs').textContent=ST.stars;
  document.getElementById('ls').textContent=ST.stars;
  save();
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

function esc(s){return (s||'').replace(/'/g,"\\'").replace(/"/g,'&quot;');}

function completeUnit(unit){
  if(!ST.progress[unit.id]) ST.progress[unit.id]={};
  ST.progress[unit.id].done=true;
  ST.progress[unit.id].tabs=unit.lessons.length;
  addStars(5); save();
  const body=document.getElementById('lbody');
  body.innerHTML=`
    <div class="complete">
      <span class="complete-e">🏆</span>
      <div class="complete-t">${unit.name}</div>
      <div class="complete-s">Tabriklaymiz! Siz bu unitni muvaffaqiyatli bajardingiz!</div>
      <div class="complete-stars">⭐⭐⭐⭐⭐</div>
      <button class="home-btn" onclick="goHome()">🏠 Bosh sahifaga</button>
    </div>`;
  toast('🎉 Unit tugadi! +5 yulduz!');
}

function renderProfile(){
  document.getElementById('ps').textContent=ST.stars;
  document.getElementById('pu').textContent=UNITS.filter(u=>ST.progress[u.id]?.done).length;
  document.getElementById('pk2').textContent=ST.streak;
  document.getElementById('plvl').textContent=Math.floor(ST.stars/25)+1;
  const ach=document.getElementById('achs');
  const list=[];
  if(ST.stars>=1) list.push({e:'⭐',t:'Birinchi yulduz'});
  if(ST.stars>=10) list.push({e:'🌟',t:'10 yulduz'});
  if(ST.stars>=25) list.push({e:'🏅',t:'25 yulduz'});
  if(ST.streak>=2) list.push({e:'🔥',t:'2 kun streak'});
  if(UNITS.filter(u=>ST.progress[u.id]?.done).length>=1) list.push({e:'🏆',t:'1-Unit bitirdi'});
  ach.innerHTML=list.map(a=>`<div class="ach"><span>${a.e}</span>${a.t}</div>`).join('');
}
